apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-digest
  namespace: jobswipe
spec:
  schedule: "0 8 * * *"    # 08:00 UTC every day
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: digest
              image: REGION-docker.pkg.dev/PROJECT_ID/jobswipe/backend:latest
              command: ["python", "-m", "app.tasks.digest"]
              envFrom:
                - configMapRef:
                    name: jobswipe-config
                - secretRef:
                    name: jobswipe-secrets
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
