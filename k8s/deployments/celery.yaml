apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery
  namespace: jobswipe
  labels:
    app: celery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery
  template:
    metadata:
      labels:
        app: celery
    spec:
      containers:
        - name: celery
          image: REGION-docker.pkg.dev/PROJECT_ID/jobswipe/backend:latest
          command: ["celery", "-A", "app.tasks.notifications", "worker", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: jobswipe-config
            - secretRef:
                name: jobswipe-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
