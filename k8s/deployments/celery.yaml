apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery
  namespace: jobswipe
  labels:
    app: celery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery
  template:
    metadata:
      labels:
        app: celery
    spec:
      containers:
        - name: celery
          image: REGION-docker.pkg.dev/PROJECT_ID/jobswipe/backend:latest
          # Must point at app.celery_app which imports BOTH notifications AND
          # cv_processing modules. Using -A app.tasks.notifications silently
          # drops every CV/job extraction task because that module doesn't
          # import them (tasks stay queued forever in production).
          command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: jobswipe-config
            - secretRef:
                name: jobswipe-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "400m"
              memory: "512Mi"
