# DO NOT commit real values — use GCP Secret Manager or sealed-secrets in production.
# This is a template only. Values are base64-encoded.
apiVersion: v1
kind: Secret
metadata:
  name: jobswipe-secrets
  namespace: jobswipe
type: Opaque
data:
  SUPABASE_URL: <base64-encoded-url>
  SUPABASE_SERVICE_KEY: <base64-encoded-service-key>
  SUPABASE_ANON_KEY: <base64-encoded-anon-key>
  RESEND_API_KEY: <base64-encoded-resend-key>
