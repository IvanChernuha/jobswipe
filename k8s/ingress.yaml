apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jobswipe-ingress
  namespace: jobswipe
  annotations:
    kubernetes.io/ingress.class: "gce"                          # GKE default ingress
    networking.gke.io/managed-certificates: "jobswipe-cert"    # GCP managed TLS cert
    kubernetes.io/ingress.global-static-ip-name: "jobswipe-ip" # reserved static IP
spec:
  rules:
    - host: jobswipe.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: jobswipe-cert
  namespace: jobswipe
spec:
  domains:
    - jobswipe.example.com
