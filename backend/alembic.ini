[alembic]
# Path to migration scripts, relative to this file.
script_location = migrations

# Templates rendered during `alembic revision`.
# Uses strict timestamps for deterministic ordering.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Ensure the backend/ dir is on sys.path so `from app.config import settings` works.
prepend_sys_path = .

timezone = UTC

# sqlalchemy.url is intentionally left empty — env.py reads it from app.config.settings
# at runtime (single source of truth for the DB URL).
sqlalchemy.url =


[post_write_hooks]
# No formatting hooks yet — add Black / Ruff here if desired.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
